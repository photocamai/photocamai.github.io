<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PhotoCamAI</title>

  <style>
    :root {
      --bg: #ffffff;
      --text: #111111;
      --muted: #666666;
      --border: #eaeaea;
      --max-width: 720px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text",
                   "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.6;
    }

    .container {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 40px 20px 64px;
      text-align: center;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 32px;
    }

    .subtitle {
      margin-bottom: 48px;
      font-size: 15px;
      color: var(--muted);
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 16px;
      max-width: 360px;
      margin: 0 auto;
    }

    .link-card {
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-radius: 10px;
      text-decoration: none;
      color: inherit;
      transition: background 0.15s ease;
    }

    .link-card:hover {
      background: #f7f7f7;
    }

    footer {
      margin-top: 64px;
      font-size: 14px;
      color: var(--muted);
    }

    @media (max-width: 480px) {
      h1 {
        font-size: 26px;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <h1>PhotoCamAI</h1>
    <div class="subtitle">
      Official information pages
    </div>

    <div class="links">
      <a class="link-card" href="terms-of-use/">Terms of Use</a>
      <a class="link-card" href="privacy-policy/">Privacy Policy</a>
      <a class="link-card" href="contact/">Contact</a>
    </div>

    <footer>
      PhotoCamAI © 2025
    </footer>
  </main>
</body>
</html>
